<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="autoplay=(self), fullscreen=(self)">
  <title>Video — Full screen (native)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: black; }
    video {
      width: 100%;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <!--
    Same-origin native <video autoplay muted> often autoplays on DeskPro's browser
    where YouTube iframe does not. Use this page when you have an MP4 (e.g. exported
    from YouTube with permission). Put the file in this repo or set src to your URL.
  -->
  <video id="myvideo" width="100%" height="100%" autoplay muted playsinline>
    <source src="video.mp4" type="video/mp4" />
  </video>
  <script>
    var useDuration = 36;
    var myVid = document.getElementById('myvideo');

    myVid.onplay = function () {
      if (!isNaN(myVid.duration)) {
        useDuration = myVid.duration;
        console.log('useDuration set to: ' + useDuration);
      }
      setTimeout(function () {
        console.log('replaying');
        myVid.load();
        myVid.play();
      }, useDuration * 1000);
    };

    myVid.onended = function () {
      console.log('replaying (ended)');
      myVid.currentTime = 0;
      myVid.play();
    };

    myVid.onerror = function () {
      console.warn('Video failed to load. Add video.mp4 to this folder or set <source src=\"...\"> to your MP4 URL.');
    };
  </script>
</body>
</html>
